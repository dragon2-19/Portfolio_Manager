<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新浪股票数据测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-section input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-section button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-section button:hover {
            transform: translateY(-2px);
        }

        .data-section {
            display: none;
        }

        .data-section.active {
            display: block;
        }

        .stock-header {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .stock-header h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .stock-ticker {
            color: #666;
            font-size: 14px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .data-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .data-card label {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .data-card .value {
            color: #333;
            font-size: 20px;
            font-weight: bold;
        }

        .raw-data-section {
            margin-top: 30px;
        }

        .raw-data-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .raw-data {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin-top: 20px;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 18px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .field-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .field-table th,
        .field-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .field-table th {
            background: #f5f7fa;
            color: #333;
            font-weight: 600;
        }

        .field-table tr:hover {
            background: #f8f9fa;
        }

        .test-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .test-buttons button {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .test-buttons button:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 新浪股票实时数据测试</h1>

        <div class="search-section">
            <input type="text" id="tickerInput" placeholder="输入股票代码 (如：600519, 000001, 300750)"
                   value="600519" />
            <button onclick="testData()">测试数据</button>
        </div>
        <div class="test-buttons">
            <button onclick="quickTest('600519')">贵州茅台</button>
            <button onclick="quickTest('000001')">平安银行</button>
            <button onclick="quickTest('300750')">宁德时代</button>
            <button onclick="quickTest('601318')">中国平安</button>
        </div>

        <div class="loading" id="loading">
            正在获取数据...
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="data-section" id="dataSection">
            <div class="stock-header">
                <h2 id="stockName">--</h2>
                <div class="stock-ticker" id="stockTicker">--</div>
            </div>

            <div class="data-grid">
                <div class="data-card">
                    <label>开盘价</label>
                    <div class="value" id="openPrice">--</div>
                </div>
                <div class="data-card">
                    <label>昨日收盘</label>
                    <div class="value" id="prevClose">--</div>
                </div>
                <div class="data-card">
                    <label>当前价格</label>
                    <div class="value" id="currentPrice">--</div>
                </div>
                <div class="data-card">
                    <label>最高价</label>
                    <div class="value" id="highPrice">--</div>
                </div>
                <div class="data-card">
                    <label>最低价</label>
                    <div class="value" id="lowPrice">--</div>
                </div>
                <div class="data-card">
                    <label>成交量 (股)</label>
                    <div class="value" id="volume">--</div>
                </div>
                <div class="data-card">
                    <label>成交额 (元)</label>
                    <div class="value" id="amount">--</div>
                </div>
                <div class="data-card">
                    <label>日期时间</label>
                    <div class="value" id="datetime">--</div>
                </div>
            </div>

            <div class="raw-data-section">
                <h3>详细字段解析</h3>
                <table class="field-table">
                    <thead>
                        <tr>
                            <th>字段索引</th>
                            <th>字段名称</th>
                            <th>值</th>
                        </tr>
                    </thead>
                    <tbody id="fieldTableBody">
                    </tbody>
                </table>
            </div>

            <div class="raw-data-section">
                <h3>原始数据</h3>
                <div class="raw-data" id="rawData">--</div>
            </div>
        </div>
    </div>

    <script>
        async function testData() {
            const ticker = document.getElementById('tickerInput').value.trim();

            if (!ticker) {
                alert('请输入股票代码');
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('dataSection').classList.remove('active');
            document.getElementById('errorMessage').style.display = 'none';

            try {
                // Determine prefix
                let prefix = 'sh';
                if (ticker.startsWith('00') || ticker.startsWith('30')) {
                    prefix = 'sz';
                }

                const url = `https://hq.sinajs.cn/list=${prefix}${ticker}`;
                console.log('Fetching:', url);

                // Create script element for JSONP
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = url;
                    script.charset = 'gb2312';

                    script.onload = () => {
                        try {
                            document.body.removeChild(script);

                            // Access Sina global variable
                            const varName = `hq_str_${prefix}${ticker}`;
                            const dataStr = window[varName];

                            if (dataStr && dataStr.length > 0) {
                                parseAndDisplay(dataStr, prefix, ticker);
                                resolve();
                            } else {
                                reject(new Error('返回数据为空'));
                            }
                        } catch (error) {
                            reject(error);
                        }
                    };

                    script.onerror = () => {
                        document.getElementById('loading').classList.remove('active');
                        showError('请求失败，请检查网络连接或股票代码是否正确');
                        reject(new Error('Failed to load script'));
                    };

                    document.body.appendChild(script);
                });

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').classList.remove('active');
                showError('获取数据失败：' + error.message);
            }
        }

        function quickTest(ticker) {
            document.getElementById('tickerInput').value = ticker;
            testData();
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        function parseAndDisplay(dataStr, prefix, ticker) {
            console.log('Raw Sina data:', dataStr);

            const fields = dataStr.split(',');

            // Sina data format:
            // 0: 股票名称
            // 1: 今日开盘价
            // 2: 昨日收盘价
            // 3: 当前价格
            // 4: 今日最高价
            // 5: 今日最低价
            // 6: 竞买价
            // 7: 竞卖价
            // 8: 成交股数
            // 9: 成交金额
            // 10-19: 买 1-5 手和报价
            // 20-29: 卖 1-5 手和报价
            // 30: 日期
            // 31: 时间

            const realtimeData = {
                name: fields[0],
                open: parseFloat(fields[1]) || 0,
                prevClose: parseFloat(fields[2]) || 0,
                currentPrice: parseFloat(fields[3]) || 0,
                high: parseFloat(fields[4]) || 0,
                low: parseFloat(fields[5]) || 0,
                bid: parseFloat(fields[6]) || 0,
                ask: parseFloat(fields[7]) || 0,
                volume: parseInt(fields[8]) || 0,
                amount: parseFloat(fields[9]) || 0,
                date: fields[30] || '',
                time: fields[31] || ''
            };

            console.log('Parsed Sina real-time data:', realtimeData);

            // Update UI
            document.getElementById('stockName').textContent = realtimeData.name;
            document.getElementById('stockTicker').textContent = `${prefix}${ticker}`;

            document.getElementById('openPrice').textContent = formatNumber(realtimeData.open);
            document.getElementById('prevClose').textContent = formatNumber(realtimeData.prevClose);
            document.getElementById('currentPrice').textContent = formatNumber(realtimeData.currentPrice);
            document.getElementById('highPrice').textContent = formatNumber(realtimeData.high);
            document.getElementById('lowPrice').textContent = formatNumber(realtimeData.low);
            document.getElementById('volume').textContent = formatVolume(realtimeData.volume);
            document.getElementById('amount').textContent = formatCurrency(realtimeData.amount);
            document.getElementById('datetime').textContent = `${realtimeData.date} ${realtimeData.time}`;

            // Update field table
            updateFieldTable(fields);

            // Show raw data
            document.getElementById('rawData').textContent = dataStr;

            // Hide loading and show data
            document.getElementById('loading').classList.remove('active');
            document.getElementById('dataSection').classList.add('active');
        }

        function updateFieldTable(fields) {
            const tbody = document.getElementById('fieldTableBody');
            tbody.innerHTML = '';

            const fieldNames = [
                '股票名称',
                '今日开盘价',
                '昨日收盘价',
                '当前价格',
                '今日最高价',
                '今日最低价',
                '竞买价',
                '竞卖价',
                '成交股数',
                '成交金额',
                '买 1 申报数',
                '买 1 申报价',
                '买 2 申报数',
                '买 2 申报价',
                '买 3 申报数',
                '买 3 申报价',
                '买 4 申报数',
                '买 4 申报价',
                '买 5 申报数',
                '买 5 申报价',
                '卖 1 申报数',
                '卖 1 申报价',
                '卖 2 申报数',
                '卖 2 申报价',
                '卖 3 申报数',
                '卖 3 申报价',
                '卖 4 申报数',
                '卖 4 申报价',
                '卖 5 申报数',
                '卖 5 申报价',
                '日期',
                '时间'
            ];

            fields.forEach((value, index) => {
                const row = tbody.insertRow();
                const cellIndex = row.insertCell(0);
                const cellName = row.insertCell(1);
                const cellValue = row.insertCell(2);

                cellIndex.textContent = index;
                cellName.textContent = fieldNames[index] || `未知字段 ${index}`;
                cellValue.textContent = value || '(空)';

                // Highlight key fields
                if ([0, 1, 2, 3, 4, 5, 8, 9, 30, 31].includes(index)) {
                    row.style.backgroundColor = '#e8f4f8';
                }
            });
        }

        function formatNumber(num) {
            if (num === 0) return '0.00';
            return num.toFixed(2);
        }

        function formatVolume(volume) {
            if (volume >= 100000000) {
                return (volume / 100000000).toFixed(2) + ' 亿';
            } else if (volume >= 10000) {
                return (volume / 10000).toFixed(2) + ' 万';
            }
            return volume.toString();
        }

        function formatCurrency(amount) {
            if (amount >= 100000000) {
                return (amount / 100000000).toFixed(2) + ' 亿';
            } else if (amount >= 10000) {
                return (amount / 10000).toFixed(2) + ' 万';
            }
            return amount.toFixed(2);
        }

        // Auto test on page load
        window.addEventListener('load', () => {
            testData();
        });
    </script>
</body>
</html>
