<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资组合 - 交易记录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>📊 投资组合</h2>
            </div>
            <ul class="sidebar-menu">
                <li>
                    <a href="dashboard.html" class="nav-link">
                        <span>📈</span> 仪表板
                    </a>
                </li>
                <li>
                    <a href="holdings.html" class="nav-link">
                        <span>💼</span> 持仓详情
                    </a>
                </li>
                <li class="active">
                    <a href="transactions.html" class="nav-link">
                        <span>📝</span> 交易记录
                    </a>
                </li>
                <li>
                    <a href="search.html" class="nav-link">
                        <span>🔍</span> 股票搜索
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1>交易记录</h1>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="loadTransactions()">
                        🔄 刷新
                    </button>
                </div>
            </header>

            <!-- Transaction Stats -->
            <section class="stats-section">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <div class="stat-label">总交易数</div>
                        <div class="stat-value" id="totalTransactions">0</div>
                    </div>
                </div>
                <div class="stat-card buy">
                    <div class="stat-icon">📈</div>
                    <div class="stat-info">
                        <div class="stat-label">买入交易</div>
                        <div class="stat-value" id="buyCount">0</div>
                    </div>
                </div>
                <div class="stat-card sell">
                    <div class="stat-icon">📉</div>
                    <div class="stat-info">
                        <div class="stat-label">卖出交易</div>
                        <div class="stat-value" id="sellCount">0</div>
                    </div>
                </div>
                <div class="stat-card deposit">
                    <div class="stat-icon">💰</div>
                    <div class="stat-info">
                        <div class="stat-label">充值次数</div>
                        <div class="stat-value" id="depositCount">0</div>
                    </div>
                </div>
                <div class="stat-card withdraw">
                    <div class="stat-icon">💵</div>
                    <div class="stat-info">
                        <div class="stat-label">提取次数</div>
                        <div class="stat-value" id="withdrawCount">0</div>
                    </div>
                </div>
            </section>

            <!-- Transactions Table -->
            <section class="table-section">
                <table id="transactionsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>股票代码</th>
                            <th>股票名称</th>
                            <th>交易类型</th>
                            <th>数量</th>
                            <th>价格</th>
                            <th>总金额</th>
                            <th>手续费</th>
                            <th>收益</th>
                            <th>交易时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsTableBody">
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="common.js"></script>
    <script src="transactions.js"></script>
</body>
</html>
