<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Transactions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>📊 Portfolio</h2>
            </div>
            <ul class="sidebar-menu">
                <li>
                    <a href="dashboard.html" class="nav-link">
                        <span>📈</span> Dashboard
                    </a>
                </li>
                <li>
                    <a href="holdings.html" class="nav-link">
                        <span>💼</span> Holdings
                    </a>
                </li>
                <li class="active">
                    <a href="transactions.html" class="nav-link">
                        <span>📝</span> Transactions
                    </a>
                </li>
                <li>
                    <a href="search.html" class="nav-link">
                        <span>🔍</span> Search
                    </a>
                </li>
                <li>
                    <a href="ai-assistant.html" class="nav-link">
                        <span>🤖</span> AI Assistant
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1>Transactions</h1>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="refreshTransactions()">
                        🔄 Refresh
                    </button>
                </div>
            </header>

            <!-- Transaction Stats -->
            <section class="stats-section">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <div class="stat-label">Total Transactions</div>
                        <div class="stat-value" id="totalTransactions">0</div>
                    </div>
                </div>
                <div class="stat-card buy">
                    <div class="stat-icon">📈</div>
                    <div class="stat-info">
                        <div class="stat-label">Buy Orders</div>
                        <div class="stat-value" id="buyCount">0</div>
                    </div>
                </div>
                <div class="stat-card sell">
                    <div class="stat-icon">📉</div>
                    <div class="stat-info">
                        <div class="stat-label">Sell Orders</div>
                        <div class="stat-value" id="sellCount">0</div>
                    </div>
                </div>
                <div class="stat-card deposit">
                    <div class="stat-icon">💰</div>
                    <div class="stat-info">
                        <div class="stat-label">Deposits</div>
                        <div class="stat-value" id="depositCount">0</div>
                    </div>
                </div>
                <div class="stat-card withdraw">
                    <div class="stat-icon">💵</div>
                    <div class="stat-info">
                        <div class="stat-label">Withdrawals</div>
                        <div class="stat-value" id="withdrawCount">0</div>
                    </div>
                </div>
            </section>

            <!-- Transactions Table -->
            <section class="table-section">
                <table id="transactionsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Ticker</th>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Volume</th>
                            <th>Price</th>
                            <th>Total</th>
                            <th>Fee</th>
                            <th>P/L</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsTableBody">
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="common.js"></script>
    <script src="transactions.js"></script>
</body>
</html>
