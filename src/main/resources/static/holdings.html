<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资组合 - 持仓详情</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>📊 投资组合</h2>
            </div>
            <ul class="sidebar-menu">
                <li>
                    <a href="dashboard.html" class="nav-link">
                        <span>📈</span> 仪表板
                    </a>
                </li>
                <li class="active">
                    <a href="holdings.html" class="nav-link">
                        <span>💼</span> 持仓详情
                    </a>
                </li>
                <li>
                    <a href="transactions.html" class="nav-link">
                        <span>📝</span> 交易记录
                    </a>
                </li>
                <li>
                    <a href="search.html" class="nav-link">
                        <span>🔍</span> 股票搜索
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1>持仓详情</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="testConnection()">
                        🔌 测试连接
                    </button>
                    <button class="btn btn-primary" onclick="openCashDepositModal()">
                        💰 充值现金
                    </button>
                    <button class="btn btn-secondary" onclick="openCashWithdrawModal()">
                        💵 提取现金
                    </button>
                    <button class="btn btn-info" onclick="openBuyModal()">
                        📈 买入股票/债券
                    </button>
                    <button class="btn btn-warning" onclick="openSellModal()">
                        📉 卖出股票/债券
                    </button>
                    <button class="btn btn-secondary" onclick="loadHoldings()">
                        🔄 刷新
                    </button>
                </div>
            </header>

            <!-- Holdings Stats -->
            <section class="stats-section">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <div class="stat-label">总持仓数</div>
                        <div class="stat-value" id="totalCount">0</div>
                    </div>
                </div>
                <div class="stat-card stock">
                    <div class="stat-icon">📈</div>
                    <div class="stat-info">
                        <div class="stat-label">股票</div>
                        <div class="stat-value" id="stockCount">0</div>
                    </div>
                </div>
                <div class="stat-card bond">
                    <div class="stat-icon">💰</div>
                    <div class="stat-info">
                        <div class="stat-label">债券</div>
                        <div class="stat-value" id="bondCount">0</div>
                    </div>
                </div>
                <div class="stat-card cash">
                    <div class="stat-icon">💵</div>
                    <div class="stat-info">
                        <div class="stat-label">现金</div>
                        <div class="stat-value" id="cashCount">0</div>
                    </div>
                </div>
            </section>

            <!-- Holdings Table -->
            <section class="table-section">
                <table id="holdingsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>股票代码</th>
                            <th>股票名称</th>
                            <th>资产类型</th>
                            <th>持有数量</th>
                            <th>平均成本</th>
                            <th>当前价格</th>
                            <th>总市值</th>
                            <th>盈亏</th>
                            <th>收益率</th>
                            <th>买入日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="holdingsTableBody">
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Cash Deposit Modal -->
    <div id="cashDepositModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCashDepositModal()">&times;</span>
            <h2>充值现金</h2>
            <form id="cashDepositForm" onsubmit="depositCash(event)">
                <div class="form-group">
                    <label for="depositAmount">充值金额:</label>
                    <input type="number" id="depositAmount" required min="0.01" step="0.01" placeholder="金额">
                </div>
                <button type="submit" class="btn btn-primary">确认充值</button>
            </form>
        </div>
    </div>

    <!-- Cash Withdraw Modal -->
    <div id="cashWithdrawModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCashWithdrawModal()">&times;</span>
            <h2>提取现金</h2>
            <form id="cashWithdrawForm" onsubmit="withdrawCash(event)">
                <div class="form-group">
                    <label for="withdrawAmount">提取金额:</label>
                    <input type="number" id="withdrawAmount" required min="0.01" step="0.01" placeholder="金额">
                </div>
                <div class="form-group">
                    <label>当前现金余额:</label>
                    <div id="currentCashBalance">¥0.00</div>
                </div>
                <button type="submit" class="btn btn-primary">确认提取</button>
            </form>
        </div>
    </div>

    <!-- Buy Stock Modal -->
    <div id="buyModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeBuyModal()">&times;</span>
            <h2>买入股票/债券</h2>
            <form id="buyForm" onsubmit="buyStock(event)">
                <div class="form-group">
                    <label for="buyTicker">股票代码:</label>
                    <input type="text" id="buyTicker" required placeholder="如: 600519">
                </div>
                <div class="form-group">
                    <label for="buyVolume">数量:</label>
                    <input type="number" id="buyVolume" required min="1" placeholder="数量">
                </div>
                <div class="form-group">
                    <label for="buyOpenPrice">今日开盘价:</label>
                    <input type="number" id="buyOpenPrice" step="0.0001" readonly placeholder="自动获取">
                </div>
                <div class="form-group">
                    <label>预计总金额:</label>
                    <div id="buyTotalAmount">¥0.00</div>
                </div>
                <button type="submit" class="btn btn-primary">确认买入</button>
            </form>
        </div>
    </div>

    <!-- Sell Stock Modal -->
    <div id="sellModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeSellModal()">&times;</span>
            <h2>卖出股票/债券</h2>
            <form id="sellForm" onsubmit="sellStock(event)">
                <div class="form-group">
                    <label for="sellTicker">股票代码:</label>
                    <input type="text" id="sellTicker" required placeholder="如: 600519">
                </div>
                <div class="form-group">
                    <label for="sellVolume">数量:</label>
                    <input type="number" id="sellVolume" required min="1" placeholder="数量">
                </div>
                <div class="form-group">
                    <label for="sellOpenPrice">今日开盘价:</label>
                    <input type="number" id="sellOpenPrice" step="0.0001" readonly placeholder="自动获取">
                </div>
                <div class="form-group">
                    <label>预计收益:</label>
                    <div id="sellProfit">¥0.00</div>
                </div>
                <button type="submit" class="btn btn-primary">确认卖出</button>
            </form>
        </div>
    </div>

    <script src="common.js"></script>
    <script src="holdings.js"></script>
</body>
</html>
