<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Pro - Intelligent Investment Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1229 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* 3D K 线图表背景 */
        .kline-chart-wrapper {
            position: fixed;
            bottom: -5%;
            left: 0;
            right: 0;
            height: 90vh;
            z-index: 0;
            perspective: 2000px;
            overflow: hidden;
        }

        /* 粒子背景层 */
        .particles-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(102, 126, 234, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, rgba(6, 182, 212, 0.1) 1.5px, transparent 1.5px),
                radial-gradient(circle at 60% 20%, rgba(102, 126, 234, 0.1) 1px, transparent 1px);
            background-size: 100px 100px, 150px 150px, 200px 200px, 120px 120px;
            animation: particlesFloat 20s linear infinite;
            pointer-events: none;
        }

        @keyframes particlesFloat {
            0% {
                transform: translateY(0) translateX(0);
            }
            50% {
                transform: translateY(-30px) translateX(20px);
            }
            100% {
                transform: translateY(0) translateX(0);
            }
        }

        /* 流光效果 */
        .flowing-light {
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(102, 126, 234, 0.08) 20%, 
                rgba(168, 85, 247, 0.08) 40%,
                rgba(6, 182, 212, 0.08) 60%,
                rgba(102, 126, 234, 0.08) 80%,
                transparent 100%);
            animation: flowingMove 12s linear infinite;
            pointer-events: none;
        }

        @keyframes flowingMove {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(50%);
            }
        }

        .kline-chart-container {
            position: relative;
            width: 75%;
            max-width: 1200px;
            margin: 0 auto;
            height: 100%;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.15) 0%, rgba(30, 41, 59, 0.85) 100%);
            transform: rotateY(-12deg) translateZ(-80px);
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5% 0;
            left: 50%;
            transform: translateX(-50%) rotateY(-12deg);
        }

        .kline-chart-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.8), rgba(102, 126, 234, 0.8), transparent);
            box-shadow: 
                0 0 40px rgba(6, 182, 212, 0.6),
                0 0 80px rgba(102, 126, 234, 0.4);
            animation: bottomLineGlow 5s ease-in-out infinite;
        }

        @keyframes bottomLineGlow {
            0%, 100% { 
                opacity: 0.8;
                box-shadow: 
                    0 0 40px rgba(6, 182, 212, 0.6),
                    0 0 80px rgba(102, 126, 234, 0.4);
            }
            50% { 
                opacity: 1;
                box-shadow: 
                    0 0 60px rgba(6, 182, 212, 0.8),
                    0 0 100px rgba(102, 126, 234, 0.6);
            }
        }

        .kline-chart-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.8), rgba(168, 85, 247, 0.8), transparent);
            box-shadow: 
                0 0 40px rgba(102, 126, 234, 0.6),
                0 0 80px rgba(168, 85, 247, 0.4);
            animation: topLineGlow 4s ease-in-out infinite;
        }

        @keyframes topLineGlow {
            0%, 100% { 
                opacity: 0.8;
                box-shadow: 
                    0 0 40px rgba(102, 126, 234, 0.6),
                    0 0 80px rgba(168, 85, 247, 0.4);
            }
            50% { 
                opacity: 1;
                box-shadow: 
                    0 0 60px rgba(102, 126, 234, 0.8),
                    0 0 100px rgba(168, 85, 247, 0.6);
            }
        }

        .chart-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0.15;
        }

        .grid-line-h {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.4), transparent);
        }

        .grid-line-h:nth-child(1) { top: 10%; }
        .grid-line-h:nth-child(2) { top: 30%; }
        .grid-line-h:nth-child(3) { top: 50%; }
        .grid-line-h:nth-child(4) { top: 70%; }
        .grid-line-h:nth-child(5) { top: 90%; }

        .grid-line-v {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(180deg, transparent, rgba(102, 126, 234, 0.3), transparent);
        }

        .grid-line-v:nth-child(6) { left: 15%; }
        .grid-line-v:nth-child(7) { left: 35%; }
        .grid-line-v:nth-child(8) { left: 55%; }
        .grid-line-v:nth-child(9) { left: 75%; }
        .grid-line-v:nth-child(10) { left: 90%; }

        /* 价格曲线容器 */
        .price-curves-container {
            position: absolute;
            top: 0;
            left: -100%;
            width: 300%;
            height: 100%;
            display: flex;
            align-items: center;
            animation: rollercoasterScroll 25s linear infinite;
            transform-style: preserve-3d;
        }

        @keyframes rollercoasterScroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-33.33%);
            }
        }

        .curve-canvas {
            flex: 1;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 30px;
            transform-style: preserve-3d;
        }

        /* 价格蜡烛图 SVG */
        .price-curve-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.6));
            transform-style: preserve-3d;
        }

        /* 蜡烛样式 */
        .candle {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .candle:hover {
            transform: scale(1.15) translateZ(20px);
            filter: drop-shadow(0 0 40px rgba(102, 126, 234, 1));
            z-index: 100;
        }

        /* 影线 - 日 K 线图样式 */
        .candle-wick {
            stroke-width: 3;
            stroke-linecap: round;
        }

        .candle-wick.bullish {
            stroke: #ef4444;
        }

        .candle-wick.bearish {
            stroke: #22c55e;
        }

        /* K 线实体 - 日 K 线图样式 */
        .candle-body {
            opacity: 1;
        }
        
        .candle-body.bullish {
            fill: #ef4444;
            stroke: #dc2626;
            stroke-width: 1px;
        }
        
        .candle-body.bearish {
            fill: #22c55e;
            stroke: #16a34a;
            stroke-width: 1px;
        }

        /* 均线样式 */
        .ma-line {
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .ma5 {
            stroke: #fbbf24;  /* 金黄色 - MA5 */
            filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.8));
        }

        .ma10 {
            stroke: #3b82f6;  /* 蓝色 - MA10 */
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.8));
        }

        /* 蜡烛动画效果 */
        .candle {
            animation: candlePulse 3s ease-in-out infinite;
        }

        .candle:nth-child(odd) {
            animation-delay: 0s;
        }

        .candle:nth-child(even) {
            animation-delay: 0.5s;
        }

        @keyframes candlePulse {
            0%, 100% {
                opacity: 0.88;
            }
            50% {
                opacity: 1;
            }
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Logo */
        .logo {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #667eea 0%, #a855f7 50%, #06b6d4 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            box-shadow: 
                0 10px 40px rgba(102, 126, 234, 0.5),
                0 0 60px rgba(168, 85, 247, 0.3);
        }

        .logo-text {
            font-size: 2em;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 50%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            text-shadow: 0 0 40px rgba(102, 126, 234, 0.4);
        }

        /* 中间内容 */
        .center-content {
            text-align: center;
            animation: fadeInUp 1.5s ease both;
            position: relative;
            z-index: 2;
            margin-top: -100px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .center-subtitle {
            font-size: 1.8em;
            color: #94a3b8;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: fadeInUp 1s ease 0.3s both;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
        }

        .center-tagline {
            font-size: 5em;
            color: #cbd5e1;
            margin-bottom: 70px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #667eea 50%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            line-height: 1.2;
            text-shadow: 0 0 60px rgba(102, 126, 234, 0.5);
            animation: fadeInUp 1s ease 0.5s both;
        }

        .start-btn {
            padding: 28px 100px;
            background: linear-gradient(135deg, #667eea 0%, #a855f7 50%, #06b6d4 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.6em;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 20px 60px rgba(102, 126, 234, 0.6),
                0 0 80px rgba(102, 126, 234, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-decoration: none;
            display: inline-block;
            letter-spacing: 5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1s ease 0.7s both;
            backdrop-filter: blur(10px);
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .start-btn:active::before {
            width: 400px;
            height: 400px;
        }

        .start-btn:hover {
            transform: translateY(-10px) scale(1.08);
            box-shadow: 
                0 30px 80px rgba(102, 126, 234, 0.8),
                0 0 100px rgba(102, 126, 234, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .center-subtitle {
                font-size: 1.5em;
            }

            .center-tagline {
                font-size: 4em;
                margin-bottom: 60px;
            }

            .start-btn {
                padding: 24px 80px;
                font-size: 1.4em;
            }

            .logo {
                top: 20px;
            }

            .kline-chart-wrapper {
                height: 60vh;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 0 20px;
                justify-content: flex-start;
                padding-top: 120px;
            }

            .logo-text {
                font-size: 1.5em;
            }

            .logo-icon {
                width: 45px;
                height: 45px;
                font-size: 1.5em;
            }

            .center-subtitle {
                font-size: 1.3em;
                margin-bottom: 20px;
            }

            .center-tagline {
                font-size: 3em;
                margin-bottom: 50px;
                letter-spacing: 3px;
            }

            .start-btn {
                padding: 20px 60px;
                font-size: 1.2em;
                width: 100%;
            }

            .kline-chart-wrapper {
                height: 50vh;
            }
        }

        @media (max-width: 480px) {
            .center-subtitle {
                font-size: 1.1em;
                letter-spacing: 2px;
            }

            .center-tagline {
                font-size: 2.2em;
                margin-bottom: 40px;
                letter-spacing: 2px;
            }

            .start-btn {
                padding: 18px 50px;
                font-size: 1.1em;
            }

            .logo {
                flex-direction: column;
                gap: 10px;
                top: 30px;
            }

            .kline-chart-wrapper {
                height: 45vh;
            }
        }
    </style>
</head>
<body>
    <!-- 3D K线图表背景 -->
    <div class="kline-chart-wrapper">
        <div class="kline-chart-container">
            <!-- 粒子层 -->
            <div class="particles-layer"></div>
            <!-- 流光效果 -->
            <div class="flowing-light"></div>
            <div class="chart-grid">
                <div class="grid-line-h"></div>
                <div class="grid-line-h"></div>
                <div class="grid-line-h"></div>
                <div class="grid-line-h"></div>
                <div class="grid-line-h"></div>
                <div class="grid-line-v"></div>
                <div class="grid-line-v"></div>
                <div class="grid-line-v"></div>
                <div class="grid-line-v"></div>
                <div class="grid-line-v"></div>
            </div>
            
            <!-- 价格蜡烛图容器 -->
            <div class="price-curves-container">
                <!-- 第一组蜡烛图 -->
                <div class="curve-canvas">
                    <svg class="price-curve-svg" viewBox="0 0 1200 500" preserveAspectRatio="none">
                        <defs>
                            <linearGradient id="openGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="closeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="highGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="lowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="bullishGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
                                <stop offset="30%" style="stop-color:#ef4444;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#dc2626;stop-opacity:1" />
                                <stop offset="70%" style="stop-color:#b91c1c;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="bearishGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
                                <stop offset="30%" style="stop-color:#22c55e;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#16a34a;stop-opacity:1" />
                                <stop offset="70%" style="stop-color:#15803d;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#14532d;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="bullishTopGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#fca5a5;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="bearishTopGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="bullishBottomGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#991b1b;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="bearishBottomGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#14532d;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#052e16;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="bullishWickGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="bearishWickGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="connectionGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.8" />
                                <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.8" />
                            </linearGradient>
                            <!-- 3D 光影滤镜 -->
                            <filter id="candleGlow" x="-50%" y="-50%" width="200%" height="200%">
                                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                                <feMerge>
                                    <feMergeNode in="coloredBlur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                            <filter id="candleShadow" x="-50%" y="-50%" width="200%" height="200%">
                                <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.5)"/>
                            </filter>
                        </defs>

                        <!-- 连接线 -->
                        <path class="candle-connection" d="M 65 130 Q 80 130 95 130" />
                                                
                        <!-- 蜡烛 1: 涨 - 日 K 线 -->
                        <g class="candle">
                            <!-- 上影线 -->
                            <line class="candle-wick bullish" x1="50" y1="40" x2="50" y2="90" />
                            <!-- K 线实体 (红色) -->
                            <rect class="candle-body bullish" x="42" y="90" width="16" height="35" />
                            <!-- 下影线 -->
                            <line class="candle-wick bullish" x1="50" y1="125" x2="50" y2="190" />
                        </g>
                                                
                        <!-- 蜡烛 2: 跌 - 日 K 线 -->
                        <g class="candle">
                            <!-- 上影线 -->
                            <line class="candle-wick bearish" x1="110" y1="70" x2="110" y2="120" />
                            <!-- K 线实体 (绿色) -->
                            <rect class="candle-body bearish" x="102" y="120" width="16" height="40" />
                            <!-- 下影线 -->
                            <line class="candle-wick bearish" x1="110" y1="160" x2="110" y2="230" />
                        </g>
                                                
                        <!-- 蜡烛 3: 涨 - 日 K 线 -->
                        <g class="candle">
                            <!-- 上影线 -->
                            <line class="candle-wick bullish" x1="170" y1="20" x2="170" y2="60" />
                            <!-- K 线实体 (红色) -->
                            <rect class="candle-body bullish" x="162" y="60" width="16" height="30" />
                            <!-- 下影线 -->
                            <line class="candle-wick bullish" x1="170" y1="90" x2="170" y2="150" />
                        </g>
                                                
                        <!-- 蜡烛 4: 跌 - 日 K 线 -->
                        <g class="candle">
                            <!-- 上影线 -->
                            <line class="candle-wick bearish" x1="230" y1="60" x2="230" y2="100" />
                            <!-- K 线实体 (绿色) -->
