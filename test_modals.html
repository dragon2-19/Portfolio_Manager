<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 Modal</title>
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fff;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
        }
        .btn {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Modal 测试</h1>
    <button class="btn btn-primary" onclick="openCashDepositModal()">打开充值 Modal</button>
    <button class="btn btn-primary" onclick="openCashWithdrawModal()">打开提取 Modal</button>
    <button class="btn btn-primary" onclick="openBuyModal()">打开买入 Modal</button>
    <button class="btn btn-primary" onclick="openSellModal()">打开卖出 Modal</button>

    <!-- Cash Deposit Modal -->
    <div id="cashDepositModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCashDepositModal()">&times;</span>
            <h2>充值现金</h2>
            <p>这是充值现金的 Modal</p>
            <button class="btn btn-primary" onclick="testFunction()">测试函数</button>
        </div>
    </div>

    <!-- Cash Withdraw Modal -->
    <div id="cashWithdrawModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCashWithdrawModal()">&times;</span>
            <h2>提取现金</h2>
            <p>这是提取现金的 Modal</p>
        </div>
    </div>

    <!-- Buy Stock Modal -->
    <div id="buyModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeBuyModal()">&times;</span>
            <h2>买入股票/债券</h2>
            <p>这是买入股票的 Modal</p>
        </div>
    </div>

    <!-- Sell Stock Modal -->
    <div id="sellModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeSellModal()">&times;</span>
            <h2>卖出股票/债券</h2>
            <p>这是卖出股票的 Modal</p>
        </div>
    </div>

    <script>
        console.log('Script loaded');

        function openCashDepositModal() {
            console.log('openCashDepositModal called');
            const modal = document.getElementById('cashDepositModal');
            if (modal) {
                modal.style.display = 'block';
                console.log('Modal opened');
            } else {
                console.error('Modal not found');
            }
        }

        function openCashWithdrawModal() {
            console.log('openCashWithdrawModal called');
            const modal = document.getElementById('cashWithdrawModal');
            if (modal) {
                modal.style.display = 'block';
                console.log('Modal opened');
            } else {
                console.error('Modal not found');
            }
        }

        function openBuyModal() {
            console.log('openBuyModal called');
            const modal = document.getElementById('buyModal');
            if (modal) {
                modal.style.display = 'block';
                console.log('Modal opened');
            } else {
                console.error('Modal not found');
            }
        }

        function openSellModal() {
            console.log('openSellModal called');
            const modal = document.getElementById('sellModal');
            if (modal) {
                modal.style.display = 'block';
                console.log('Modal opened');
            } else {
                console.error('Modal not found');
            }
        }

        function closeCashDepositModal() {
            document.getElementById('cashDepositModal').style.display = 'none';
        }

        function closeCashWithdrawModal() {
            document.getElementById('cashWithdrawModal').style.display = 'none';
        }

        function closeBuyModal() {
            document.getElementById('buyModal').style.display = 'none';
        }

        function closeSellModal() {
            document.getElementById('sellModal').style.display = 'none';
        }

        function testFunction() {
            alert('函数调用成功！');
        }

        // 点击 modal 外部关闭
        window.onclick = function(event) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }

        console.log('All functions defined');
    </script>
</body>
</html>
